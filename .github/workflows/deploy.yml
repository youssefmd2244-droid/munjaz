name: Swarm Auto-Evolve & Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-validate:
    name: Build, Audit & Deploy Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-rate-limit-bypass: true
          node-version: 20
          cache: 'npm'

      - name: Install Base Dependencies
        run: npm ci

      - name: Run TypeScript Syntax Check
        run: npm run lint

      - name: Compile Full-Stack Assets
        run: npm run build

      - name: Dry Run Success Output
        run: |
          echo "✨ Swarm Node Compiled Successfully!"
          echo "🚀 Ready for deploy on Vercel or GCP Cloud Run."
